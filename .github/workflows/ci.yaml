name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一 ref の旧 run をキャンセルする。build-linux が mozuku-lsp をソース
# ビルドして重いため、force-push 時の並走が特に無駄になる。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: nixbuild/nix-quick-install-action@9f63be77f412a248c9d9a65a4c82cf066cdf8f0c # v35
        with:
          enable_kvm: false
      # eval 時 IFD を排除してあるため、darwin を含む全システムの構成評価が
      # 単一の Linux ランナーで完結する (--no-build なのでビルドはしない)。
      - run: nix flake check --no-build --all-systems --print-build-logs

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: nixbuild/nix-quick-install-action@9f63be77f412a248c9d9a65a4c82cf066cdf8f0c # v35
        with:
          enable_kvm: false
      - run: nix run .#fmt -- --ci

  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0

  # x86_64-linux の checks (home-linux / home-wsl / treefmt / tests) を実ビルドする。
  # eval だけでは hash 切れや vendorHash 不一致が素通りするため。
  # mozuku-lsp は公開キャッシュに無くソースビルドになるため、Nix store を
  # cache-nix-action でラン間キャッシュする。mozuku 更新時はキャッシュミスして
  # ソースビルドが走るので、検証性は保たれる。
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: nixbuild/nix-quick-install-action@9f63be77f412a248c9d9a65a4c82cf066cdf8f0c # v35
        with:
          enable_kvm: false
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-store-${{ runner.os }}-
          gc-max-store-size-linux: 2G
          purge: true
          purge-prefixes: nix-store-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
      # 軽量なテストを先に完了させ、後続の全checkでは同じstore pathを再利用する。
      - name: Build test checks
        run: nix build .#checks.x86_64-linux.bats-tests .#checks.x86_64-linux.merge-py-tests --print-build-logs
      - run: nix flake check --print-build-logs

  # darwin 構成の実ビルド。eval だけでは hash 切れや darwin 専用パッケージの
  # ビルド破損が素通りするため (build-linux と同じ理由の macOS 版)。
  # brew-nix の cask 取得で upstream 都合の失敗があり得る — 慢性化したら
  # ビルド対象の分割を検討する。
  build-darwin:
    runs-on: macos-14
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: nixbuild/nix-quick-install-action@9f63be77f412a248c9d9a65a4c82cf066cdf8f0c # v35
        with:
          enable_kvm: false
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-store-${{ runner.os }}-
          gc-max-store-size-macos: 2G
          purge: true
          purge-prefixes: nix-store-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
      - run: nix flake check --print-build-logs
