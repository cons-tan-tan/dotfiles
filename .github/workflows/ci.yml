name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一 ref の旧 run をキャンセルする。build-linux が mozuku-lsp をソース
# ビルドして重いため、force-push 時の並走が特に無駄になる。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: DeterminateSystems/determinate-nix-action@9adf02b41cfdac2632e1c16f0480ff5bf3b05dd6 # v3.21.1
      # eval 時 IFD を排除してあるため、darwin を含む全システムの構成評価が
      # 単一の Linux ランナーで完結する (--no-build なのでビルドはしない)。
      - run: nix flake check --no-build --all-systems --print-build-logs

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: DeterminateSystems/determinate-nix-action@9adf02b41cfdac2632e1c16f0480ff5bf3b05dd6 # v3.21.1
      - run: nix run .#fmt -- --ci

  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: fsfe/reuse-action@bb774aa972c2a89ff34781233d275075cbddf542 # v5.0.0

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: DeterminateSystems/determinate-nix-action@9adf02b41cfdac2632e1c16f0480ff5bf3b05dd6 # v3.21.1
      - run: nix profile install --inputs-from . nixpkgs#bats
      - run: bats tests/

  # x86_64-linux の checks (home-linux / home-wsl / treefmt) を実ビルドする。
  # eval だけでは hash 切れや vendorHash 不一致が素通りするため。
  # mozuku-lsp は公開キャッシュに無くソースビルドになるため、Nix store を
  # cache-nix-action でラン間キャッシュする。mozuku 更新時はキャッシュミスして
  # ソースビルドが走るので、検証性は保たれる。
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: DeterminateSystems/determinate-nix-action@9adf02b41cfdac2632e1c16f0480ff5bf3b05dd6 # v3.21.1
        with:
          extra-conf: |
            accept-flake-config = true
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-store-${{ runner.os }}-
          gc-max-store-size-linux: 2G
          purge: true
          purge-prefixes: nix-store-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
      - run: nix flake check --print-build-logs

  # darwin 構成の実ビルド。eval だけでは hash 切れや darwin 専用パッケージの
  # ビルド破損が素通りするため (build-linux と同じ理由の macOS 版)。
  # brew-nix の cask 取得で upstream 都合の失敗があり得る — 慢性化したら
  # ビルド対象の分割を検討する。
  build-darwin:
    runs-on: macos-14
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: DeterminateSystems/determinate-nix-action@9adf02b41cfdac2632e1c16f0480ff5bf3b05dd6 # v3.21.1
        with:
          extra-conf: |
            accept-flake-config = true
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-store-${{ runner.os }}-
          gc-max-store-size-macos: 2G
          purge: true
          purge-prefixes: nix-store-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
      - run: nix flake check --print-build-logs
